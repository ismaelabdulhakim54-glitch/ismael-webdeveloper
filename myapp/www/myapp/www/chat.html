<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ismael AI 🤖</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 50px;
    }

    #chatOutput {
      border: 1px solid #ccc;
      padding: 10px;
      height: 300px;
      overflow-y: scroll;
      margin-top: 20px;
      text-align: left;
    }

    #chatInput {
      width: 70%;
      padding: 10px;
    }

    #sendBtn {
      padding: 10px 20px;
    }
  </style>
</head>
<body>

<h1>Ismael AI 🤖</h1>

<input type="text" id="chatInput" placeholder="Type your message here">
<button id="sendBtn">Send</button>

<div id="chatOutput"></div>

<script src="chat.js"></script>

</body>
</html>
